name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend Tests (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: india-democracy-simulator/backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: india-democracy-simulator/backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        env:
          DATABASE_URL: "sqlite+aiosqlite://"
          JWT_SECRET_KEY: "ci-test-secret-key"
          DEBUG: "true"
        run: |
          pytest --cov=app --cov-report=xml --cov-report=term -v

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: india-democracy-simulator/backend/coverage.xml

  frontend-tests:
    name: Frontend Tests (Node.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: india-democracy-simulator/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: india-democracy-simulator/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx jest --passWithNoTests --ci

      - name: Build check
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:8000/api/v1"

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: india-democracy-simulator/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: india-democracy-simulator/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
